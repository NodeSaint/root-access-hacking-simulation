<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Root Access</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">user@localhost:~$ </span>
            <input type="text" id="command-input" autofocus autocomplete="off" autocapitalize="off" spellcheck="false">
            <span id="cursor" class="blink">█</span>
            <span id="input-measure" aria-hidden="true"></span>
        </div>
    </div>


    <script src="js/story.js"></script>
    <script src="js/filesystem.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/game.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
